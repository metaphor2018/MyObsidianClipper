<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MyObsidianClipper - 設定</title>
  <link rel="stylesheet" href="settings.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>MyObsidianClipper 設定</h1>
      <p class="subtitle">YouTubeの動画をObsidianに保存するための設定を行います</p>
    </div>

    <div class="form-section">
      <h2>Gemini API</h2>
      <div class="form-group">
        <label for="gemini-api-key">APIキー</label>
        <div class="input-with-button">
          <input type="password" id="gemini-api-key" placeholder="sk-...">
          <button id="test-api-key-btn" class="btn btn-small" title="APIキーが有効か確認">テスト</button>
        </div>
        <p class="help-text">
          <a href="https://aistudio.google.com/apikey" target="_blank">Google AI Studio</a> から取得したAPIキーを入力してください
        </p>
      </div>
      <div class="form-group">
        <label for="gemini-model">モデル</label>
        <select id="gemini-model">
          <option value="gemini-2.0-flash">Gemini 2.0 Flash（推奨）</option>
          <option value="gemini-1.5-flash">Gemini 1.5 Flash</option>
        </select>
      </div>
    </div>

    <div class="form-section">
      <h2>Obsidian設定</h2>
      <div class="form-group">
        <label for="obsidian-vault">Vault名</label>
        <input type="text" id="obsidian-vault" placeholder="例: MyVault">
        <p class="help-text">
          Obsidianの「Open vault」に表示されるVault名を入力してください（URI方式で使用）
        </p>
      </div>
      <div class="form-group">
        <label for="obsidian-folder">保存先フォルダ</label>
        <input type="text" id="obsidian-folder" placeholder="例: YouTube/動画要約">
        <p class="help-text">
          Vault内の保存先フォルダパス（/で階層化）。空白の場合はVaultルート
        </p>
      </div>
    </div>

    <div class="form-section">
      <h2>ダウンロード設定</h2>
      <div class="form-group">
        <label for="download-folder">ダウンロード先フォルダ</label>
        <input type="text" id="download-folder" placeholder="空白でChromeのデフォルト">
        <p class="help-text">
          「ダウンロード」ボタンで保存するフォルダ（空白の場合はChromeのデフォルト）
        </p>
      </div>
    </div>

    <div class="form-actions">
      <button id="save-btn" class="btn btn-primary">保存</button>
      <button id="reset-btn" class="btn btn-secondary">リセット</button>
      <span id="status-message" class="status-message"></span>
    </div>
  </div>

  <script src="settings.js"></script>
</body>
</html>
